name: universal_wasm_loader
description: >-
  Web-first Dart loader for WebAssembly "DLL" modules. Auto-detects the companion
  .wit, applies the Canonical ABI (wasmtime profile), and returns a typed handle.
version: 0.1.0
repository: https://github.com/jrmarcum/universalWasmLoader-dart

environment:
  sdk: ^3.4.0

dependencies:
  web: ^1.1.0

dev_dependencies:
  lints: ^4.0.0
  test: ^1.25.0
